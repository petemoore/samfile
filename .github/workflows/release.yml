name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - run: go vet ./...
      - run: go test -race ./...

  ensure-release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
              --title "samfile ${GITHUB_REF_NAME#v}" --draft
          fi

  build:
    needs: ensure-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: windows, goarch: amd64, ext: .exe }
          - { goos: windows, goarch: arm64, ext: .exe }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Cross-compile samfile-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          OUT="samfile-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build \
            -ldflags "-X main.revision=${GITHUB_SHA} -X main.version=${VERSION}" \
            -o "${OUT}" ./cmd/samfile
          ls -la "${OUT}"
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OUT="samfile-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          gh release upload "${GITHUB_REF_NAME}" "${OUT}" \
            --repo "${GITHUB_REPOSITORY}" --clobber
